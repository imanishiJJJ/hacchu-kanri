<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="発注管理">
<title>🍞 発注管理 — カフェヨシノ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #FDF6F0;
  --surface: #FFFFFF;
  --surf2:   #FFF0EC;
  --border:  #E8CFC0;
  --accent:  #C8385A;
  --accent2: #A82848;
  --text:    #3D1F1F;
  --text2:   #9A7060;
  --green:   #4CAF7D;
  --red:     #C8385A;
  --jisha:   #C8385A;
  --daiko:   #8B5E3C;
  --safe-b:  env(safe-area-inset-bottom,0px);
  --safe-t:  env(safe-area-inset-top,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;}

.header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:2px solid var(--accent);padding-top:var(--safe-t);box-shadow:0 2px 8px rgba(200,56,90,.1);}
.header-inner{padding:12px 16px 0;}
.header h1{font-size:17px;font-weight:700;color:var(--accent);letter-spacing:.05em;}
.header p{font-size:11px;color:var(--text2);margin:2px 0 10px;}
.tabs{display:flex;}
.tab{flex:1;padding:10px 0;border:none;background:transparent;color:var(--text2);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}

.content{padding:16px;padding-bottom:calc(80px + var(--safe-b));max-width:600px;margin:0 auto;}

.setup-banner{background:#FFF5F0;border:1px solid #F0C0A0;border-radius:12px;padding:14px;margin-bottom:20px;}
.setup-banner p{font-size:12px;color:#8B5E3C;margin-bottom:10px;}
.setup-row{display:flex;gap:8px;}
.setup-input{flex:1;background:#fff;border:1px solid #E8CFC0;border-radius:8px;padding:11px 12px;color:var(--text);font-family:inherit;font-size:13px;min-width:0;}
.setup-input:focus{outline:none;border-color:var(--accent);}
.setup-btn{background:var(--accent);border:none;border-radius:8px;padding:11px 16px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.connected-badge{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#F0FFF0;border:1px solid #A8D8A0;border-radius:10px;font-size:12px;color:#3D7A3D;}
.connected-badge button{margin-left:auto;background:transparent;border:1px solid #C0D0C0;border-radius:6px;padding:4px 12px;color:var(--text2);font-family:inherit;font-size:11px;cursor:pointer;}

.form-top{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.field-full{grid-column:1/-1;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.05em;}
.field select,.field input[type="date"],.field input[type="text"]{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-family:inherit;font-size:15px;width:100%;appearance:none;-webkit-appearance:none;}
.field select:focus,.field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,56,90,.1);}

.section-title{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';width:4px;height:14px;background:var(--accent);border-radius:2px;display:inline-block;}

.item-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(200,56,90,.06);}
.item-header{display:flex;align-items:baseline;gap:8px;margin-bottom:12px;}
.item-name{font-size:14px;font-weight:600;color:var(--text);}
.item-unit{font-size:11px;color:var(--text2);}
.qty-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.qty-block{display:flex;flex-direction:column;gap:5px;}
.qty-label{font-size:11px;font-weight:700;}
.qty-label.jisha{color:var(--accent);}
.qty-label.daiko{color:var(--daiko);}
.qty-input{background:var(--surf2);border:1.5px solid var(--border);border-radius:8px;padding:10px 8px;color:var(--text);font-family:inherit;font-size:20px;font-weight:700;width:100%;text-align:center;-moz-appearance:textfield;appearance:textfield;}
.qty-input::-webkit-inner-spin-button,.qty-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
.qty-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,56,90,.1);}
.qty-input.has-value{border-color:var(--accent);background:#FFF0F3;color:var(--accent);font-weight:700;}

.submit-footer{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(253,246,240,.95);border-top:1px solid var(--border);padding:12px 16px;padding-bottom:calc(12px + var(--safe-b));backdrop-filter:blur(8px);}
.submit-btn{width:100%;max-width:600px;margin:0 auto;display:block;padding:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.05em;box-shadow:0 4px 12px rgba(200,56,90,.3);}
.submit-btn:active{transform:scale(.98);opacity:.9;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;box-shadow:none;}
.submit-btn.saved{background:linear-gradient(135deg,#4CAF7D,#388E5D);box-shadow:0 4px 12px rgba(76,175,125,.3);}

.history-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px;flex-wrap:wrap;}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;}
.filter-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--text2);font-family:inherit;font-size:12px;cursor:pointer;transition:all .2s;}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
.filter-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);}
.reload-btn{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--text2);font-family:inherit;font-size:12px;cursor:pointer;}

.order-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(200,56,90,.06);}
.order-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px;}
.order-meta{display:flex;flex-direction:column;gap:4px;}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;}
.badge-store{background:#FFF0F3;color:var(--accent);border:1px solid #F0C0C8;}
.badge-date{background:#FFF8F0;color:#8B5E3C;border:1px solid #E8CFC0;}
.order-actions{display:flex;gap:8px;}
.btn-sm{flex:1;padding:9px;border-radius:8px;border:none;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;}
.btn-print{background:#EFF6FF;color:#3B6BB5;border:1px solid #C0D8F0;}
.btn-edit{background:#FFF0F3;color:var(--accent);border:1px solid #F0C0C8;}
.btn-del{background:#FFF5F5;color:#C05050;border:1px solid #F0C0C0;}

.empty{text-align:center;padding:60px 20px;color:var(--text2);font-size:14px;}
.loading{text-align:center;padding:60px;color:var(--text2);font-size:13px;}
.err-msg{background:#FFF5F5;border:1px solid #F0C0C0;border-radius:10px;padding:12px 14px;color:#C05050;font-size:12px;margin-bottom:14px;}

#print-view{display:none;}
.print-toolbar{padding:12px 16px;background:#fff;display:flex;gap:10px;align-items:center;border-bottom:2px solid var(--accent);position:sticky;top:0;}
.print-back{background:transparent;color:var(--text2);border:1.5px solid var(--border);border-radius:8px;padding:8px 14px;font-family:inherit;font-size:13px;cursor:pointer;}
.print-exec{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 18px;cursor:pointer;font-weight:bold;font-family:inherit;font-size:13px;}
.delivery-wrap{background:#fff;color:#000;display:flex;width:100%;}

@media print{
  body{background:#fff !important;}
  #main-view,.submit-footer{display:none !important;}
  #print-view{display:block !important;}
  .print-toolbar{display:none !important;}
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
}
</style>
</head>
<body>

<div id="main-view">
  <div class="header">
    <div class="header-inner">
      <h1>🍞 発注管理システム</h1>
      <p>株式会社 カフェヨシノ</p>
    </div>
    <div class="tabs">
      <button class="tab active"   id="tab-input"   onclick="switchTab('input')">📝 発注入力</button>
      <button class="tab inactive" id="tab-history" onclick="switchTab('history')">📊 発注履歴</button>
    </div>
  </div>

  <div class="content">
    <div id="setup-banner" class="setup-banner">
      <p>⚙️ 初回設定：Google Apps Script の URL を入力してください</p>
      <div class="setup-row">
        <input class="setup-input" id="gas-url-input" type="url" placeholder="https://script.google.com/macros/s/…/exec">
        <button class="setup-btn" onclick="saveGasUrl()">保存</button>
      </div>
    </div>

    <!-- 発注入力 -->
    <div id="tab-input-content">
      <div id="edit-banner" style="display:none;background:#1e2a1e;border:1px solid #3a6040;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#70c080;display:none;align-items:center;gap:10px;">
        ✏️ 訂正モード
        <button onclick="cancelEdit()" style="margin-left:auto;background:transparent;border:1px solid #3a6040;border-radius:6px;padding:3px 12px;color:var(--text2);font-family:inherit;font-size:11px;cursor:pointer;">キャンセル</button>
      </div>
      <div class="form-top">
        <div class="field field-full">
          <label>店舗</label>
          <select id="f-store"></select>
        </div>
        <div class="field field-full">
          <label>納品日（タップしてカレンダーで選択）</label>
          <input type="date" id="f-delivery-date">
        </div>
      </div>
      <div class="section-title">数量を入力</div>
      <div id="items-grid"></div>
    </div>

    <!-- 発注履歴 -->
    <div id="tab-history-content" style="display:none">
      <div class="history-toolbar">
        <div class="filter-bar" id="filter-bar"></div>
        <button class="reload-btn" onclick="loadHistory()">↻ 更新</button>
      </div>
      <div id="history-error"></div>
      <div id="history-list"></div>
    </div>
  </div>

  <div class="submit-footer" id="submit-footer">
    <button class="submit-btn" id="submit-btn" onclick="submitOrder()">発注を登録する →</button>
  </div>
</div>

<!-- 印刷画面 -->
<div id="print-view">
  <div class="print-toolbar">
    <button class="print-back" onclick="closePrint()">← 戻る</button>
    <button class="print-exec" onclick="window.print()">🖨️ 印刷</button>
    <span style="font-size:11px;color:#888">A4横推奨</span>
  </div>
  <div class="delivery-wrap" id="delivery-content"></div>
</div>

<script>
// ══ マスターデータ ══
const STORES = ["太田川店","山王店","中島店","ロースタリー"];
const ITEMS = [
  {id:1,  name:"食パン7枚切",                    unit:"斤",    price:650,  jisha:610,  cost:610,  tax:0.08},
  {id:2,  name:"食パン10枚切",                   unit:"斤",    price:650,  jisha:610,  cost:610,  tax:0.08},
  {id:3,  name:"食パン20枚切",                   unit:"斤",    price:650,  jisha:610,  cost:610,  tax:0.08},
  {id:4,  name:"食パンスライスなし",              unit:"斤",    price:650,  jisha:610,  cost:610,  tax:0.08},
  {id:5,  name:"生ドーナツプレーン",              unit:"個",    price:110,  jisha:105,  cost:105,  tax:0.08},
  {id:6,  name:"生ドーナツチョコ",               unit:"個",    price:150,  jisha:145,  cost:145,  tax:0.08},
  {id:7,  name:"バスクチーズケーキ",              unit:"個",    price:2936, jisha:2896, cost:2896, tax:0.08},
  {id:8,  name:"アップルパイ",                   unit:"個",    price:3264, jisha:3224, cost:3224, tax:0.08},
  {id:9,  name:"ホットケーキ5枚入",              unit:"袋",    price:600,  jisha:575,  cost:575,  tax:0.08},
  {id:10, name:"食パン表示ラベル",               unit:"枚",    price:3,    jisha:3,    cost:1.8,  tax:0.10},
  {id:11, name:"ヨシノブレンド表示ラベル",       unit:"枚",    price:3,    jisha:3,    cost:1.8,  tax:0.10},
  {id:12, name:"アイスヨシノブレンド表示ラベル", unit:"枚",    price:3,    jisha:3,    cost:1.8,  tax:0.10},
  {id:13, name:"パータグラッセリュクブラン5kg",  unit:"ケース",price:9400, jisha:9400, cost:8500, tax:0.08},
  {id:14, name:"パータグラッセレタージュ5kg",    unit:"ケース",price:10500,jisha:10500,cost:9500, tax:0.08},
  {id:15, name:"ピスタチオ刻み1kg",             unit:"袋",    price:6200, jisha:6200, cost:5600, tax:0.08},
  {id:16, name:"アーモンド刻み2kg",             unit:"袋",    price:4100, jisha:4100, cost:3700, tax:0.08},
  {id:17, name:"ピスタチオプラリネマッセ1kg",   unit:"個",    price:6000, jisha:6000, cost:5440, tax:0.08},
  {id:18, name:"送料",                          unit:"件",    price:1000, jisha:1000, cost:0,    tax:0.10},
  {id:19, name:"無塩バター",                    unit:"個",    price:860,  jisha:860,  cost:780,  tax:0.08},
];

// ══ GAS URL ══
const GAS_KEY = "yoshino_gas_url";
function getGasUrl(){ return localStorage.getItem(GAS_KEY)||""; }
function saveGasUrl(){
  const url=document.getElementById("gas-url-input").value.trim();
  if(!url){alert("URLを入力してください");return;}
  localStorage.setItem(GAS_KEY,url);
  updateBanner();
}
function resetGasUrl(){ localStorage.removeItem(GAS_KEY); location.reload(); }
function updateBanner(){
  const url=getGasUrl();
  if(!url) return;
  document.getElementById("setup-banner").innerHTML=
    `<div class="connected-badge">✅ GAS接続済み<button onclick="resetGasUrl()">変更</button></div>`;
}

// ══ ユーティリティ ══
function today(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDays(s,n){
  // ローカル時間で計算（UTCズレを防ぐ）
  const parts = String(s).slice(0,10).split('-');
  const d = new Date(Number(parts[0]), Number(parts[1])-1, Number(parts[2])+n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function nowStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtDate(s){
  if(!s) return "";
  let str;
  if(s instanceof Date){
    // Dateオブジェクトはローカル時間で変換
    str=`${s.getFullYear()}-${String(s.getMonth()+1).padStart(2,'0')}-${String(s.getDate()).padStart(2,'0')}`;
  } else {
    str=String(s).slice(0,10);
  }
  const [y,m,d]=str.split("-");
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}
function fmtNum(n){ return Number(n).toLocaleString(); }

// ══ タブ切り替え ══
function switchTab(tab){
  document.getElementById("tab-input-content").style.display   = tab==="input"   ?"":"none";
  document.getElementById("tab-history-content").style.display = tab==="history" ?"":"none";
  document.getElementById("submit-footer").style.display       = tab==="input"   ?"":"none";
  document.getElementById("tab-input").className   = "tab "+(tab==="input"   ?"active":"inactive");
  document.getElementById("tab-history").className = "tab "+(tab==="history" ?"active":"inactive");
  if(tab==="history") loadHistory();
}

// ══ フォーム初期化 ══
function initForm(){
  // 店舗
  const sel=document.getElementById("f-store");
  STORES.forEach(s=>{ const o=document.createElement("option"); o.value=o.text=s; sel.appendChild(o); });

  // 納品日（デフォルト+1日、任意変更可）
  document.getElementById("f-delivery-date").value = addDays(today(),1);

  // 品目カード（単価非表示・単位表示）
  const grid=document.getElementById("items-grid");
  ITEMS.forEach(item=>{
    const c=document.createElement("div");
    c.className="item-card";
    c.innerHTML=`
      <div class="item-header">
        <span class="item-name">${item.name}</span>
        <span class="item-unit">${item.unit}</span>
      </div>
      <div class="qty-row">
        <div class="qty-block">
          <div class="qty-label daiko">🚚 大光便</div>
          <input type="number" inputmode="numeric" pattern="[0-9]*" min="0" placeholder="0"
            class="qty-input" id="q-daiko-${item.id}"
            onkeydown="if(event.key==='ArrowUp'||event.key==='ArrowDown')event.preventDefault()"
            onwheel="event.preventDefault()"
            oninput="this.classList.toggle('has-value',this.value!=='')">
        </div>
        <div class="qty-block">
          <div class="qty-label jisha">🏠 自社便</div>
          <input type="number" inputmode="numeric" pattern="[0-9]*" min="0" placeholder="0"
            class="qty-input" id="q-jisha-${item.id}"
            onkeydown="if(event.key==='ArrowUp'||event.key==='ArrowDown')event.preventDefault()"
            onwheel="event.preventDefault()"
            oninput="this.classList.toggle('has-value',this.value!=='')">
        </div>
      </div>`;
    grid.appendChild(c);
  });

  // フィルター
  const fb=document.getElementById("filter-bar");
  ["全店舗",...STORES].forEach(s=>{
    const b=document.createElement("button");
    b.className="filter-btn"+(s==="全店舗"?" active":"");
    b.textContent=s;
    b.onclick=()=>{ fb.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active")); b.classList.add("active"); renderHistory(s); };
    fb.appendChild(b);
  });
}

// ══ 発注送信 ══
async function submitOrder(){
  const url=getGasUrl();
  if(!url){ alert("先にGAS URLを設定してください"); return; }
  const isEdit = !!_editingId;
  const payload={
    action:       isEdit ? "update" : "add",
    id:           isEdit ? _editingId : undefined,
    store:        document.getElementById("f-store").value,
    inputDate:    nowStr(),
    deliveryDate: document.getElementById("f-delivery-date").value,
  };
  ITEMS.forEach(item=>{
    payload[`jisha_${item.id}`] = Number(document.getElementById(`q-jisha-${item.id}`).value)||0;
    payload[`daiko_${item.id}`] = Number(document.getElementById(`q-daiko-${item.id}`).value)||0;
    payload[`price_${item.id}`] = item.price;
    payload[`cost_${item.id}`]  = item.cost;
  });
  const btn=document.getElementById("submit-btn");
  btn.disabled=true; btn.textContent="送信中…";
  try{
    const res=await fetch(url,{method:"POST",body:JSON.stringify(payload)});
    const json=await res.json();
    if(json.status!=="ok") throw new Error(json.message||"エラー");
    btn.classList.add("saved");
    btn.textContent = isEdit ? "✓ 訂正しました！" : "✓ 登録しました！";
    _editingId = null;
    document.getElementById("edit-banner").style.display="none";
    setTimeout(()=>{ btn.classList.remove("saved"); btn.disabled=false; btn.textContent="発注を登録する →"; resetForm(); },1800);
  }catch(e){ alert("送信エラー: "+e.message); btn.disabled=false; btn.textContent= isEdit?"訂正を保存する →":"発注を登録する →"; }
}

function resetForm(){
  document.getElementById("f-delivery-date").value = addDays(today(),1);
  ITEMS.forEach(item=>["jisha","daiko"].forEach(t=>{
    const el=document.getElementById(`q-${t}-${item.id}`);
    el.value=""; el.classList.remove("has-value");
  }));
  window.scrollTo({top:0,behavior:"smooth"});
}

// ══ 編集状態 ══
let _editingId = null;

function editOrder(order){
  _editingId = order.id;
  // 入力タブに切り替えてフォームに値をセット
  switchTab('input');
  document.getElementById("f-store").value = order.store;
  document.getElementById("f-delivery-date").value =
    (order.deliveryDate instanceof Date)
      ? order.deliveryDate.toISOString().slice(0,10)
      : String(order.deliveryDate).slice(0,10);
  ITEMS.forEach(item=>{
    const jEl=document.getElementById(`q-jisha-${item.id}`);
    const dEl=document.getElementById(`q-daiko-${item.id}`);
    const jv = Number(order[`jisha_${item.id}`])||0;
    const dv = Number(order[`daiko_${item.id}`])||0;
    jEl.value = jv||""; jEl.classList.toggle("has-value", jv>0);
    dEl.value = dv||""; dEl.classList.toggle("has-value", dv>0);
  });
  const banner = document.getElementById("edit-banner");
  banner.style.display = "flex";
  document.getElementById("submit-btn").textContent = "訂正を保存する →";
  window.scrollTo({top:0,behavior:"smooth"});
}

function cancelEdit(){
  _editingId = null;
  document.getElementById("edit-banner").style.display = "none";
  document.getElementById("submit-btn").textContent = "発注を登録する →";
  resetForm();
}
let _orders=[];
async function loadHistory(){
  const url=getGasUrl(), list=document.getElementById("history-list"), errEl=document.getElementById("history-error");
  errEl.innerHTML="";
  if(!url){ list.innerHTML='<div class="empty">⚙️ URLを設定してください</div>'; return; }
  list.innerHTML='<div class="loading">読み込み中…</div>';
  try{
    const res=await fetch(url+"?action=list"), json=await res.json();
    if(json.status!=="ok") throw new Error(json.message);
    _orders=json.orders||[];
    const active=document.querySelector("#filter-bar .filter-btn.active");
    renderHistory(active?active.textContent:"全店舗");
  }catch(e){ list.innerHTML=""; errEl.innerHTML=`<div class="err-msg">⚠️ 取得エラー: ${e.message}</div>`; }
}

function renderHistory(filter){
  const list=document.getElementById("history-list");
  const orders=_orders
    .filter(o=>filter==="全店舗"||o.store===filter)
    // 店舗・日付が空のブランク行は非表示
    .filter(o=>o.store && String(o.deliveryDate).slice(0,4).match(/^\d{4}$/))
    .sort((a,b)=>String(b.deliveryDate).localeCompare(String(a.deliveryDate)));
  if(!orders.length){ list.innerHTML='<div class="empty">発注履歴がありません</div>'; return; }
  list.innerHTML=orders.map(o=>{
    const lines=orderLines(o);
    const rowsHtml=lines.length
      ? lines.map(l=>`
          <tr>
            <td style="padding:5px 8px;font-size:12px;color:var(--text2)">${fmtDate(o.deliveryDate)}</td>
            <td style="padding:5px 8px;font-size:12px"><span style="color:${l.type==='自社便'?'var(--jisha)':'var(--daiko)'}">${l.type}</span></td>
            <td style="padding:5px 8px;font-size:12px;color:var(--text)">${l.name}</td>
            <td style="padding:5px 8px;font-size:12px;text-align:right;font-weight:700;color:var(--accent)">${l.qty}<span style="font-size:10px;color:var(--text2)">${l.unit}</span></td>
          </tr>`).join("")
      : `<tr><td colspan="4" style="padding:8px;text-align:center;font-size:11px;color:#5050a0">数量入力なし</td></tr>`;
    return `<div class="order-card">
      <div class="order-head">
        <div class="order-meta">
          <span class="badge badge-store">${o.store}</span>
          <span class="badge badge-date">📅 ${fmtDate(o.deliveryDate)}</span>
        </div>
      </div>
      <div style="overflow-x:auto;margin-bottom:10px">
        <table style="width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:8px;overflow:hidden">
          <thead>
            <tr style="background:var(--surf2)">
              <th style="padding:5px 8px;font-size:11px;color:var(--text2);font-weight:600;text-align:left">納品日</th>
              <th style="padding:5px 8px;font-size:11px;color:var(--text2);font-weight:600;text-align:left">便区分</th>
              <th style="padding:5px 8px;font-size:11px;color:var(--text2);font-weight:600;text-align:left">品名</th>
              <th style="padding:5px 8px;font-size:11px;color:var(--text2);font-weight:600;text-align:right">数量</th>
            </tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
      <div class="order-actions">
        <button class="btn-sm btn-edit" onclick='editOrder(${JSON.stringify(o)})'>✏️ 訂正</button>
        <button class="btn-sm btn-print" onclick='openPrint(${JSON.stringify(o)})'>🖨️ 納品書</button>
        <button class="btn-sm btn-del" onclick="deleteOrder('${o.id}')">削除</button>
      </div>
    </div>`;
  }).join("");
}

function orderLines(o){
  const lines=[];
  ITEMS.forEach(item=>{
    const j=Number(o[`jisha_${item.id}`])||0, d=Number(o[`daiko_${item.id}`])||0;
    if(j>0) lines.push({name:`[自] ${item.name}`, qty:j, unit:item.unit, price:item.price, tax:item.tax, type:"自社便"});
    if(d>0) lines.push({name:`[大] ${item.name}`, qty:d, unit:item.unit, price:item.price, tax:item.tax, type:"大光便"});
  });
  return lines;
}

async function deleteOrder(id){
  if(!confirm("削除しますか？")) return;
  try{
    const res=await fetch(getGasUrl(),{method:"POST",body:JSON.stringify({action:"delete",id})});
    const json=await res.json();
    if(json.status!=="ok") throw new Error(json.message);
    await loadHistory();
  }catch(e){ alert("削除エラー: "+e.message); }
}

// ══ 納品書・受領書印刷 ══
// 基本9品（[大]のみ）: 単価・金額・合計なし
// それ以外: 単価・金額・合計あり
// 両方ある場合はA4×2枚出力

const BASIC_ITEMS = new Set([1,2,3,4,5,6,7,8,9]); // 基本9品のID

function openPrint(order){
  const allLines = orderLines(order);

  // 基本9品の[大]のみ
  const basicLines  = allLines.filter(l => BASIC_ITEMS.has(
    ITEMS.find(i => `[大] ${i.name}` === l.name || `[自] ${i.name}` === l.name)?.id
  ) && l.type === "大光便");

  // それ以外（基本9品の自社便含む、ラベル・バター・送料など）
  const otherLines  = allLines.filter(l => {
    const item = ITEMS.find(i => `[大] ${i.name}` === l.name || `[自] ${i.name}` === l.name);
    if (!item) return true;
    if (BASIC_ITEMS.has(item.id) && l.type === "大光便") return false;
    return true;
  });

  // 税率別合計（その他アイテム用）
  const total8  = otherLines.filter(l=>l.tax===0.08).reduce((s,l)=>s+l.qty*l.price,0);
  const total10 = otherLines.filter(l=>l.tax===0.10).reduce((s,l)=>s+l.qty*l.price,0);
  const taxTotal = Math.round(total8*1.08) + Math.round(total10*1.10);

  // 基本納品書（単価・金額・合計なし）
  function basicDocHtml(title, hdrBg, rowBg1){
    const rows = basicLines.length
      ? basicLines.map((l,i)=>{
          const bg = i%2===0 ? rowBg1 : "#FFFFFF";
          return `<tr style="background:${bg}">
            <td style="padding:5px 8px;font-size:11px;border-bottom:1px solid #ddd">${l.name}</td>
            <td style="padding:5px 8px;font-size:11px;text-align:center;font-weight:bold;border-bottom:1px solid #ddd">${l.qty}</td>
            <td style="padding:5px 8px;font-size:11px;text-align:center;border-bottom:1px solid #ddd">${l.unit}</td>
          </tr>`;
        }).join("")
      : `<tr><td colspan="3" style="padding:12px;text-align:center;color:#999;font-size:10px">数量入力なし</td></tr>`;

    return `<div style="width:50%;padding:16px 18px;font-family:'Noto Serif JP',serif;box-sizing:border-box;">
      <div style="background:${hdrBg};color:#fff;text-align:center;font-size:16px;font-weight:bold;letter-spacing:.3em;padding:10px;margin-bottom:10px;">${title}</div>
      <table style="width:100%;border-collapse:collapse;margin-bottom:10px;font-size:10px;">
        <tr><td style="width:80px;color:#555">カフェヨシノ</td><td style="font-weight:bold">${order.store}</td></tr>
        <tr><td style="color:#555">納品日</td><td style="font-weight:bold">${fmtDate(order.deliveryDate)}</td></tr>
      </table>
      <table style="width:100%;border-collapse:collapse;border:1px solid #999;">
        <thead>
          <tr style="background:${hdrBg};color:#fff;">
            <th style="padding:5px 8px;font-size:10px;text-align:left">品名</th>
            <th style="padding:5px 8px;font-size:10px;width:44px">数量</th>
            <th style="padding:5px 8px;font-size:10px;width:34px">単位</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="margin-top:6px;text-align:right;font-size:9px;color:#555">株式会社 カフェヨシノ　〒455-0832　愛知県名古屋市港区宝神三丁目1311　TEL：052-355-8849</div>
    </div>`;
  }

  // その他納品書（単価・金額・合計あり）
  function otherDocHtml(title, hdrBg, rowBg1){
    const rows = otherLines.length
      ? otherLines.map((l,i)=>{
          const bg = i%2===0 ? rowBg1 : "#FFFFFF";
          const taxMark = l.tax===0.10 ? '<span style="font-size:9px;color:#c00;margin-left:2px">※10%</span>' : '';
          return `<tr style="background:${bg}">
            <td style="padding:4px 8px;font-size:10px;border-bottom:1px solid #ddd">${l.name}${taxMark}</td>
            <td style="padding:4px 8px;font-size:10px;text-align:center;font-weight:bold;border-bottom:1px solid #ddd">${l.qty}</td>
            <td style="padding:4px 8px;font-size:10px;text-align:center;border-bottom:1px solid #ddd">${l.unit}</td>
            <td style="padding:4px 8px;font-size:10px;text-align:right;border-bottom:1px solid #ddd">¥${fmtNum(l.price)}</td>
            <td style="padding:4px 8px;font-size:10px;text-align:right;border-bottom:1px solid #ddd">${fmtNum(l.qty*l.price)}</td>
          </tr>`;
        }).join("")
      : `<tr><td colspan="5" style="padding:12px;text-align:center;color:#999;font-size:10px">数量入力なし</td></tr>`;

    const taxBreakdown = `<div style="font-size:9px;color:#555;text-align:right;margin-top:4px;">
      ${total8>0 ? `8%対象：¥${fmtNum(total8)}　税額：¥${fmtNum(Math.round(total8*0.08))}` : ''}
      ${total8>0 && total10>0 ? '　／　' : ''}
      ${total10>0 ? `10%対象：¥${fmtNum(total10)}　税額：¥${fmtNum(Math.round(total10*0.10))}` : ''}
    </div>`;

    return `<div style="width:50%;padding:16px 18px;font-family:'Noto Serif JP',serif;box-sizing:border-box;">
      <div style="background:${hdrBg};color:#fff;text-align:center;font-size:16px;font-weight:bold;letter-spacing:.3em;padding:10px;margin-bottom:10px;">${title}</div>
      <table style="width:100%;border-collapse:collapse;margin-bottom:6px;font-size:10px;">
        <tr><td style="width:80px;color:#555">カフェヨシノ</td><td style="font-weight:bold">${order.store}</td></tr>
        <tr><td style="color:#555">納品日</td><td style="font-weight:bold">${fmtDate(order.deliveryDate)}</td></tr>
      </table>
      <table style="width:100%;border-collapse:collapse;margin-bottom:2px;font-size:10px;background:#f5f5f5;">
        <tr>
          <td style="padding:6px 8px">合計金額</td>
          <td style="padding:6px 8px;font-size:14px;font-weight:bold;text-align:right">¥${fmtNum(taxTotal)}</td>
          <td style="padding:6px 8px;color:#555">（税込）</td>
        </tr>
      </table>
      ${taxBreakdown}
      <table style="width:100%;border-collapse:collapse;border:1px solid #999;margin-top:6px;">
        <thead>
          <tr style="background:${hdrBg};color:#fff;">
            <th style="padding:4px 8px;font-size:10px;text-align:left">品名</th>
            <th style="padding:4px 8px;font-size:10px;width:36px">数量</th>
            <th style="padding:4px 8px;font-size:10px;width:30px">単位</th>
            <th style="padding:4px 8px;font-size:10px;width:54px">単価</th>
            <th style="padding:4px 8px;font-size:10px;width:60px">金額</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="margin-top:4px;font-size:9px;color:#c00;">※印は消費税10%対象</div>
      <div style="margin-top:4px;text-align:right;font-size:9px;color:#555">株式会社 カフェヨシノ　〒455-0832　愛知県名古屋市港区宝神三丁目1311　TEL：052-355-8849</div>
    </div>`;
  }

  let html = "";

  // 基本9品がある場合 → 1枚目（A4横）
  if (basicLines.length > 0) {
    html += `<div style="display:flex;width:100%;page-break-after:${otherLines.length>0?'always':'auto'};">
      ${basicDocHtml("納　品　書","#1565C0","#E3F2FD")}
      <div style="width:1px;background:#ccc;margin:12px 0"></div>
      ${basicDocHtml("受　領　書","#2E7D32","#E8F5E9")}
    </div>`;
  }

  // その他アイテムがある場合 → 2枚目（A4横）
  if (otherLines.length > 0) {
    html += `<div style="display:flex;width:100%;">
      ${otherDocHtml("納　品　書","#1565C0","#E3F2FD")}
      <div style="width:1px;background:#ccc;margin:12px 0"></div>
      ${otherDocHtml("受　領　書","#2E7D32","#E8F5E9")}
    </div>`;
  }

  if (!html) {
    html = `<div style="padding:40px;text-align:center;color:#999;font-size:14px;">数量入力なし</div>`;
  }

  document.getElementById("delivery-content").innerHTML = html;
  document.getElementById("main-view").style.display="none";
  document.getElementById("print-view").style.display="block";
  window.scrollTo(0,0);
}
function closePrint(){
  document.getElementById("main-view").style.display="";
  document.getElementById("print-view").style.display="none";
}

updateBanner();
initForm();
</script>
